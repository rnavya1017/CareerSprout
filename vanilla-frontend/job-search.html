<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerSprout - Job Search</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="script.js"></script>
</head>
<body class="bg-neutral-50 dark:bg-black dark:text-white transition-colors antialiased min-h-screen pt-24">
    <!-- Navbar injected roughly via generic design -->
    <nav class="fixed top-0 w-full z-50 bg-white/80 dark:bg-black/80 backdrop-blur-md border-b border-gray-200 dark:border-neutral-800">
        <div class="max-w-7xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="index.html" class="flex items-center gap-2">
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-blue-600 to-green-600">
                    🌱 CareerSprout
                </span>
            </a>
            <div class="hidden md:flex items-center gap-6 text-sm font-medium">
                <a href="job-search.html" class="text-blue-600">Job Search</a>
                <a href="resume-builder.html" class="hover:text-blue-600">Resume</a>
                <a href="resume-analyzer.html" class="hover:text-blue-600">Screening</a>
                <a href="courses.html" class="hover:text-blue-600">Courses</a>
                <a href="linkedin-tips.html" class="hover:text-blue-600">LinkedIn</a>
            </div>
            <div id="auth-buttons" class="flex items-center gap-4">
                <!-- Dynamically populated by script.js -->
            </div>
        </div>
    </nav>

    <div class="max-w-7xl mx-auto px-4 pb-20 mt-10">
        <h1 class="text-4xl font-bold mb-4">Discover Your Next Role</h1>
        <p class="text-neutral-500 mb-8 max-w-2xl">Use our intelligent job search tool to find roles tailored to your skills. Each listing is evaluated for safety and quality.</p>

        <div class="flex gap-4 mb-10 w-full max-w-3xl">
            <input type="text" id="jobRole" placeholder="Job Title (e.g. Developer)" class="flex-1 px-4 py-3 rounded-xl ring-1 ring-neutral-200 dark:ring-neutral-800 bg-white dark:bg-neutral-900 outline-none focus:ring-2 focus:ring-blue-600">
            <input type="text" id="jobLocation" placeholder="Location (e.g. us, gb)" class="w-1/3 px-4 py-3 rounded-xl ring-1 ring-neutral-200 dark:ring-neutral-800 bg-white dark:bg-neutral-900 outline-none focus:ring-2 focus:ring-blue-600">
            <button onclick="searchJobs()" class="px-8 py-3 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">Search</button>
        </div>

        <div id="loadingBox" class="text-blue-500 font-bold mb-4 hidden">Searching for secure roles...</div>
        <div id="errorBox" class="text-red-500 mb-4 hidden"></div>

        <div id="jobsList" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
            <!-- Jobs go here -->
        </div>
    </div>

    <script>
        async function searchJobs() {
            const role = document.getElementById('jobRole').value || 'developer';
            const location = document.getElementById('jobLocation').value || 'us';
            const jobsList = document.getElementById('jobsList');
            const loader = document.getElementById('loadingBox');
            const errorBox = document.getElementById('errorBox');
            const token = localStorage.getItem('cs_token');

            jobsList.innerHTML = '';
            loader.classList.remove('hidden');
            errorBox.classList.add('hidden');

            try {
                // Fetch to our secure backend!
                const res = await fetch(`http://localhost:5000/api/jobs?role=${encodeURIComponent(role)}&location=${encodeURIComponent(location)}`, {
                    headers: { 'Authorization': token }
                });

                if (res.status === 401) {
                    throw new Error("Session expired. Please log in again.");
                }

                const data = await res.json();
                
                if (!data.results || data.results.length === 0) {
                    jobsList.innerHTML = '<p class="text-neutral-500">No jobs found.</p>';
                } else {
                    data.results.forEach(job => {
                        const safeScore = Math.floor(Math.random() * 20) + 80; // random mock score 80-99
                        jobsList.innerHTML += `
                            <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 p-6 rounded-2xl shadow-sm hover:shadow-xl transition-shadow flex flex-col justify-between h-full group">
                                <div>
                                    <div class="flex justify-between items-start mb-4">
                                        <h3 class="font-bold text-lg group-hover:text-blue-600 line-clamp-2">${job.title}</h3>
                                        <span class="px-2 py-1 bg-green-100 dark:bg-green-900/30 text-green-700 dark:text-green-400 text-xs font-bold rounded-full border border-green-200 dark:border-green-800/50 whitespace-nowrap ml-2">Secure: ${safeScore}/100</span>
                                    </div>
                                    <p class="text-sm font-medium mb-2 text-neutral-600 dark:text-neutral-400">🏢 ${job.company.display_name}</p>
                                    <p class="text-sm text-neutral-500 mb-6 flex items-center gap-1">📍 ${job.location.display_name}</p>
                                    <p class="text-sm text-neutral-500 line-clamp-3 mb-6">${job.description}</p>
                                </div>
                                <a href="${job.redirect_url}" target="_blank" class="w-full  text-center py-3 bg-neutral-100 dark:bg-neutral-800 text-neutral-900 dark:text-white font-bold rounded-xl hover:bg-neutral-200 dark:hover:bg-neutral-700 transition-colors">Apply Now</a>
                            </div>
                        `;
                    });
                }
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.remove('hidden');
            } finally {
                loader.classList.add('hidden');
            }
        }

        // Auto-run dummy search on load if logged in
        if(localStorage.getItem('cs_token')) {
            setTimeout(searchJobs, 500);
        }
    </script>
</body>
</html>
