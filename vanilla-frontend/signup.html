<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CareerSprout - Sign Up</title>
    <link rel="stylesheet" href="style.css">
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-neutral-50 dark:bg-black dark:text-white transition-colors antialiased min-h-screen">
    <div class="max-w-7xl mx-auto px-4 py-20 flex justify-center items-center mt-20">
        <div class="bg-white dark:bg-neutral-900 border border-neutral-200 dark:border-neutral-800 rounded-3xl p-10 shadow-2xl w-full max-w-md">
            <h1 class="text-3xl font-bold mb-2">Create an Account</h1>
            <p class="text-neutral-500 mb-8">Join CareerSprout to securely access all features.</p>
            
            <form id="signupForm" class="space-y-6">
                <div class="space-y-2">
                    <label class="text-sm font-bold text-neutral-600 dark:text-neutral-400">Full Name</label>
                    <input type="text" id="name" required class="w-full px-4 py-3 bg-neutral-50 dark:bg-neutral-800 border-none rounded-xl ring-1 ring-neutral-200 dark:ring-neutral-700 outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-neutral-600 dark:text-neutral-400">Email</label>
                    <input type="email" id="email" required class="w-full px-4 py-3 bg-neutral-50 dark:bg-neutral-800 border-none rounded-xl ring-1 ring-neutral-200 dark:ring-neutral-700 outline-none">
                </div>
                <div class="space-y-2">
                    <label class="text-sm font-bold text-neutral-600 dark:text-neutral-400">Password</label>
                    <input type="password" id="password" required class="w-full px-4 py-3 bg-neutral-50 dark:bg-neutral-800 border-none rounded-xl ring-1 ring-neutral-200 dark:ring-neutral-700 outline-none">
                </div>
                <div id="errorBox" class="text-red-500 text-sm hidden"></div>
                <button type="submit" class="w-full py-4 bg-blue-600 text-white font-bold rounded-xl hover:bg-blue-700">Sign Up</button>
            </form>
            <p class="text-center text-sm text-neutral-500 mt-4">
                Already have an account? <a href="login.html" class="text-blue-600 font-bold hover:underline">Log In</a>
            </p>
        </div>
    </div>

    <script>
        document.getElementById('signupForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const name = document.getElementById('name').value;
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;
            const errorBox = document.getElementById('errorBox');
            errorBox.classList.add('hidden');

            try {
                const res = await fetch('http://localhost:5000/api/auth/signup', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, email, password })
                });
                const data = await res.json();
                
                if (!res.ok) throw new Error(data.error || 'Signup failed');
                
                localStorage.setItem('cs_token', data.token);
                localStorage.setItem('cs_user', JSON.stringify(data.user));
                window.location.href = 'index.html';
            } catch (err) {
                errorBox.textContent = err.message;
                errorBox.classList.remove('hidden');
            }
        });
    </script>
</body>
</html>
